<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Blog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-title">Web Terminal Blog</div>
            <div class="terminal-controls">
                <div class="control close"></div>
                <div class="control minimize"></div>
                <div class="control maximize"></div>
            </div>
        </div>
        <div class="terminal-body">
            <div class="system-info">
                <span class="username">user</span>@<span class="hostname">blog</span>:<span class="path">~</span> <span class="time"></span>
            </div>
            <div class="terminal-output" id="output"></div>
            <div class="terminal-input-line">
                <span class="prompt">user@blog:~$ </span>
                <input type="text" class="terminal-input" id="input" autocomplete="off" autofocus>
                <span class="cursor" id="cursor"></span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
